name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/insightsoop-main/receipt-tmoney
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: ./gradlew bootJar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Deploy to EC2 via SSM
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Run deploy command on EC2
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          HTML_VIEW_HOST: ${{ secrets.HTML_VIEW_HOST }}
          DATA_HOST: ${{ secrets.DATA_HOST }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os, shlex

          docker_cmd = shlex.join([
              'docker', 'run', '-d', '--name', 'receipt-tmoney',
              '-p', '8080:8080',
              '-e', f"DB_URL={os.environ['DB_URL']}",
              '-e', f"DB_USERNAME={os.environ['DB_USERNAME']}",
              '-e', f"DB_PASSWORD={os.environ['DB_PASSWORD']}",
              '-e', f"HTML_VIEW_HOST={os.environ['HTML_VIEW_HOST']}",
              '-e', f"DATA_HOST={os.environ['DATA_HOST']}",
              'ghcr.io/insightsoop-main/receipt-tmoney:latest'
          ])

          commands = [
              'docker pull ghcr.io/insightsoop-main/receipt-tmoney:latest',
              'docker stop receipt-tmoney || true',
              'docker rm receipt-tmoney || true',
              docker_cmd,
          ]

          subprocess.run([
              'aws', 'ssm', 'send-command',
              '--instance-ids', os.environ['EC2_INSTANCE_ID'],
              '--document-name', 'AWS-RunShellScript',
              '--parameters', json.dumps({'commands': commands}),
              '--region', 'ap-northeast-2',
          ], check=True)
          EOF
